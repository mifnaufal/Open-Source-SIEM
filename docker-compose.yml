version: '3.8'

services:
  # Redis Streams - Message Broker (Layer 1)
  redis:
    image: redis:7-alpine
    container_name: siem-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - siem-network
    restart: unless-stopped

  # Elasticsearch - Storage (Layer 3)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: siem-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=siem-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - siem-network
    restart: unless-stopped
    depends_on:
      - redis

  # Kibana - Dashboard (Layer 3)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: siem-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - siem-network
    restart: unless-stopped
    depends_on:
      - elasticsearch

  # Grafana - Dashboard (Layer 4)
  grafana:
    image: grafana/grafana:latest
    container_name: siem-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - siem-network
    restart: unless-stopped
    depends_on:
      - elasticsearch

  # Processing Pipeline (Layer 2)
  siem-processor:
    build: .
    container_name: siem-processor
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    volumes:
      - ./rules:/app/rules
      - ./logs:/app/logs
    networks:
      - siem-network
    restart: unless-stopped
    depends_on:
      - redis
      - elasticsearch

volumes:
  redis_data:
  es_data:
  grafana_data:

networks:
  siem-network:
    driver: bridge
